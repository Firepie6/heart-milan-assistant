async function decompress(b64) {
  const bin = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const ds = new DecompressionStream("gzip");
  const w = ds.writable.getWriter();
  w.write(bin); w.close();
  const r = ds.readable.getReader();
  const ch = [];
  while (true) { const { done, value } = await r.read(); if (done) break; ch.push(value); }
  const m = new Uint8Array(ch.reduce((a, c) => a + c.length, 0));
  let o = 0; for (const c of ch) { m.set(c, o); o += c.length; }
  return JSON.parse(new TextDecoder().decode(m));
}

// localStorage wrapper (replaces window.storage from Claude artifacts)
const store = {
  async get(k) { const v = localStorage.getItem(k); return v ? { value: v } : null; },
  async set(k, v) { localStorage.setItem(k, v); return { key: k, value: v }; },
  async delete(k) { localStorage.removeItem(k); return { key: k }; },
};

function buildPrompt(target, lang, aptName, aptInfo, kb) {
  const l = lang === "it";
  const tgt = target === "guest"
    ? (l ? "Il receptionist incolla messaggi degli ospiti. Genera la RISPOSTA PRONTA.\n\nFormato:\n\ud83d\udce8 RISPOSTA DA INVIARE:\n[risposta da copiare]\n\nSe serve:\n\u26a0\ufe0f NOTE PER IL RECEPTIONIST:\n[note interne]"
      : "The receptionist pastes guest messages. Generate the READY-TO-SEND REPLY.\n\nFormat:\n\ud83d\udce8 REPLY TO SEND:\n[copy-paste reply]\n\nIf needed:\n\u26a0\ufe0f NOTES FOR RECEPTIONIST:\n[internal notes]")
    : (l ? "Il receptionist fa domande interne. Rispondi direttamente, chiaro e conciso."
      : "Receptionist asks internal questions. Answer directly.");
  const acc = l
    ? "REGOLE ACCURATEZZA CRITICHE:\n1. Rispondi ESCLUSIVAMENTE con informazioni presenti nel testo qui sotto.\n2. Se la risposta NON e scritta -> rispondi: Non ho questa informazione. Verifica con reception/manager.\n3. NON INVENTARE, NON DEDURRE, NON IMMAGINARE.\n4. Per soldi -> SEMPRE ESCALARE AL MANAGER.\n5. Cita i dati esatti come scritti."
    : "CRITICAL ACCURACY RULES:\n1. Answer EXCLUSIVELY with information present below.\n2. If NOT written -> reply: I dont have this info. Check with reception/manager.\n3. DO NOT INVENT or IMAGINE.\n4. For money -> ALWAYS ESCALATE TO MANAGER.\n5. Quote exact data as written.";
  let aptSec = "";
  if (aptName && aptName !== "none") {
    aptSec = aptInfo
      ? "\n\n========================================\nDATI APPARTAMENTO: " + aptName + "\nUSA SOLO QUESTI DATI.\n========================================\n" + aptInfo + "\n========================================"
      : "\n\nAPPARTAMENTO: " + aptName + " - NESSUN DATO.";
  }
  return tgt + "\n\n" + (l ? "Rispondi in italiano." : "Reply in English.") + "\n\n" + acc + aptSec + "\n\n" + kb;
}

function renderMd(text) {
  if (!text) return "";
  return text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/^- (.+)$/gm, "\u2022 $1").replace(/\n/g, "<br/>");
}

            <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
              <textarea ref={taRef} value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
                placeholder={target === "guest" ? "Incolla il messaggio dell'ospite..." : "Scrivi la tua domanda..."} rows={1}
                style={{ flex: 1, padding: "11px 16px", borderRadius: 24, border: "1px solid #E5E5EA", background: "#fff", fontSize: 13, fontFamily: "inherit", color: "#1D1D1F", outline: "none", resize: "none", lineHeight: 1.5 }} />
              <button onClick={send} disabled={!input.trim() || loading} style={{
                width: 40, height: 40, borderRadius: "50%", border: "none", flexShrink: 0,
                background: input.trim() && !loading ? "#007AFF" : "#E5E5EA", color: input.trim() && !loading ? "#fff" : "#C7C7CC",
                cursor: input.trim() && !loading ? "pointer" : "default", display: "flex", alignItems: "center", justifyContent: "center",
                boxShadow: input.trim() && !loading ? "0 2px 8px #007AFF44" : "none", transition: "all .15s",
              }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>
        </>}

        {/* APARTMENTS */}
        {page === "apts" && (
          <div style={{ flex: 1, overflow: "auto", padding: 28 }}>
            <div style={{ marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#1D1D1F" }}>Appartamenti</div>
                <div style={{ fontSize: 13, color: "#8E8E93", marginTop: 2 }}>{allData ? Object.keys(allData).length : 0} con dati</div>
              </div>
              {adminMsg && <span style={{ fontSize: 13, color: "#34C759", fontWeight: 600 }}>{adminMsg}</span>}
            </div>
            {editAptName !== "none" ? (
              <div>
                <button onClick={() => { setEditAptName("none"); setEditApt(""); }} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 0", background: "none", border: "none", cursor: "pointer", color: "#007AFF", fontSize: 13, fontFamily: "inherit", marginBottom: 12, fontWeight: 500 }}>
                  \u2039 Torna alla lista
                </button>
                <div style={{ background: "#fff", borderRadius: 18, padding: 20, boxShadow: "0 1px 4px rgba(0,0,0,.06)" }}>
                  <div style={{ fontSize: 16, fontWeight: 600, color: "#1D1D1F", marginBottom: 12 }}>{editAptName}</div>
                  <textarea value={editApt} onChange={e => setEditApt(e.target.value)}
                    style={{ width: "100%", minHeight: 400, padding: 14, borderRadius: 12, border: "1.5px solid #E5E5EA", background: "#F9F9F9", fontSize: 12, fontFamily: "monospace", color: "#1D1D1F", resize: "vertical", outline: "none", lineHeight: 1.6 }} />
                  <button onClick={saveApt} style={{ marginTop: 12, padding: "10px 20px", borderRadius: 12, border: "none", background: "#007AFF", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 2px 8px #007AFF44" }}>Salva</button>
                </div>
              </div>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10 }}>
                {APT_NAMES.map(a => (
                  <div key={a} onClick={() => { setEditAptName(a); setEditApt(allData?.[a] || ""); }}
                    style={{ background: "#fff", borderRadius: 14, padding: "14px 16px", cursor: "pointer", boxShadow: "0 1px 4px rgba(0,0,0,.06)", transition: "all .15s", borderLeft: "3px solid " + (allData?.[a] ? "#34C759" : "#E5E5EA") }}
                    onMouseEnter={e => e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e => e.currentTarget.style.transform=""}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#1D1D1F" }}>{a}</div>
                    <div style={{ fontSize: 11, color: allData?.[a] ? "#34C759" : "#C7C7CC", marginTop: 3 }}>{allData?.[a] ? (allData[a].length / 1024).toFixed(1) + " KB" : "Nessun dato"}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* KB */}
        {page === "kb" && (
          <div style={{ flex: 1, overflow: "auto", padding: 28 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
              <div>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#1D1D1F" }}>Knowledge Base</div>
                <div style={{ fontSize: 13, color: "#8E8E93", marginTop: 2 }}>Regole, procedure, FAQ usate dall'AI</div>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                {adminMsg && <span style={{ fontSize: 13, color: "#34C759", fontWeight: 600 }}>{adminMsg}</span>}
                <button onClick={resetKB} style={{ padding: "8px 16px", borderRadius: 10, border: "1px solid #E5E5EA", background: "#F9F9F9", color: "#8E8E93", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Ripristina</button>
                <button onClick={saveKB} style={{ padding: "8px 16px", borderRadius: 10, border: "none", background: "#007AFF", color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 2px 8px #007AFF44" }}>Salva</button>
              </div>
            </div>
            <div style={{ background: "#fff", borderRadius: 18, padding: 20, boxShadow: "0 1px 4px rgba(0,0,0,.06)" }}>
              <textarea value={editKB} onChange={e => setEditKB(e.target.value)}
                style={{ width: "100%", minHeight: 500, padding: 14, borderRadius: 12, border: "1.5px solid #E5E5EA", background: "#F9F9F9", fontSize: 12, fontFamily: "monospace", color: "#1D1D1F", resize: "vertical", outline: "none", lineHeight: 1.6 }} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
